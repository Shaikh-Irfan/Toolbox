<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Formatter — Toolbox</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Toolbox.</a>
  <ul class="nav-links">
    <li><a href="../resume.html">← Resume & Career</a></li>
    <li><a href="../index.html">Home</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="../resume.html">Resume & Career</a><span>/</span><span>Resume Formatter</span></div>
  <h1 class="page-title">Resume Formatter</h1>
  <p class="page-desc">Paste your resume text below. It will be cleaned, structured and formatted — then print or save as PDF.</p>
</div>
<div class="tool-workspace">
  <div class="options-row" style="flex-wrap:wrap;margin-bottom:1rem">
    <div class="option-group">
      <div class="option-label">Font</div>
      <select class="option-select" id="fontFamily" onchange="updatePreview()">
        <option value="Georgia, serif">Georgia (Classic)</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="Arial, sans-serif">Arial (Modern)</option>
        <option value="'Calibri', sans-serif">Calibri</option>
      </select>
    </div>
    <div class="option-group">
      <div class="option-label">Font Size</div>
      <select class="option-select" id="fontSize" onchange="updatePreview()">
        <option value="11pt">11pt</option>
        <option value="12pt" selected>12pt</option>
        <option value="13pt">13pt</option>
      </select>
    </div>
    <div class="option-group">
      <div class="option-label">Margin</div>
      <select class="option-select" id="margin" onchange="updatePreview()">
        <option value="0.6in">Narrow (0.6in)</option>
        <option value="0.8in" selected>Normal (0.8in)</option>
        <option value="1in">Wide (1in)</option>
      </select>
    </div>
  </div>

  <div class="rf-split-grid">
    <div>
      <div class="option-label" style="margin-bottom:0.4rem">Paste your resume here</div>
      <textarea class="textarea-tool" id="resumeInput" style="min-height:400px;font-size:0.82rem" oninput="updatePreview()" placeholder="Paste your resume content here...

John Doe
john@email.com | +91 98765 43210

EDUCATION
B.Tech Computer Science — IIT Delhi (2020-2024)

EXPERIENCE
Software Engineer — Google (2024-Present)
• Built scalable backend services
• Improved system performance by 40%

SKILLS
Python, Java, React, Node.js"></textarea>
    </div>
    <div>
      <div class="option-label" style="margin-bottom:0.4rem">Preview</div>
      <div id="preview" style="background:#fff;color:#111;padding:0.8in;min-height:400px;font-size:12pt;line-height:1.6;font-family:Georgia,serif;border-radius:3px;white-space:pre-wrap;word-break:break-word;overflow-y:auto;max-height:500px"></div>
    </div>
  </div>

  <div class="btn-row" style="margin-top:1.25rem">
    <button class="btn-primary" onclick="printResume()">🖨 Print / Save as PDF</button>
    <button class="btn-secondary" onclick="document.getElementById('resumeInput').value='';updatePreview()">Clear</button>
  </div>
  <div class="status-msg" id="status"></div>
  <div class="ad-strip" style="margin-top:2rem">Advertisement</div>
</div>
<footer><span class="footer-logo">Toolbox.</span><span class="footer-note">Free tools. Always.</span></footer>
<script>
function updatePreview(){
  const text = document.getElementById('resumeInput').value;
  const font = document.getElementById('fontFamily').value;
  const size = document.getElementById('fontSize').value;
  const preview = document.getElementById('preview');
  preview.style.fontFamily = font;
  preview.style.fontSize = size;

  // Format: bold section headers (all-caps lines), structure bullet points
  let formatted = text
    .replace(/^([A-Z][A-Z\s&]+)$/gm, '<strong style="font-size:1.05em;border-bottom:1px solid #333;display:block;margin-top:0.8em;padding-bottom:2px">$1</strong>')
    .replace(/^[•\-\*]\s/gm, '&nbsp;&nbsp;• ');
  preview.innerHTML = formatted || '<span style="color:#999">Your formatted resume will appear here...</span>';
}

function printResume(){
  const text = document.getElementById('resumeInput').value.trim();
  if(!text){ document.getElementById('status').textContent='Please paste your resume first.'; document.getElementById('status').className='status-msg error'; return; }
  const font = document.getElementById('fontFamily').value;
  const size = document.getElementById('fontSize').value;
  const margin = document.getElementById('margin').value;

  let body = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^([A-Z][A-Z\s&]{3,})$/gm,'<h2 style="font-size:1em;border-bottom:1px solid #333;margin:1em 0 0.3em;padding-bottom:2px;text-transform:uppercase;letter-spacing:0.05em">$1</h2>')
    .replace(/^[•\-\*]\s(.+)$/gm,'<li style="margin-bottom:3px">$1</li>');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:${font};font-size:${size};margin:${margin};line-height:1.5;color:#111}
    h2{font-size:1em;border-bottom:1px solid #333;margin:1em 0 0.3em;padding-bottom:2px}
    li{margin-bottom:3px} ul{margin:0;padding-left:1.2em}
    @media print{body{margin:${margin}}}
  
.rf-split-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:640px){ .rf-split-grid { grid-template-columns:1fr; } }
/* Make preview stack below input on mobile */
@media(max-width:640px){
  .rf-split-grid > div:first-child { order:1; }
  .rf-split-grid > div:last-child { order:2; }
  #preview { min-height:220px; font-size:0.82rem !important; padding:0.6rem !important; }
  .options-row { flex-direction:column; }
  .option-select, .option-input { min-width:0; width:100%; }
}
</style></head><body>${body}</body></html>`;

  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(()=>{ win.print(); }, 500);
  document.getElementById('status').textContent='Print dialog opened — choose "Save as PDF".';
  document.getElementById('status').className='status-msg success';
}
updatePreview();
</script>
</body></html>
