<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel to PDF — Toolbox</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Toolbox.</a>
  <ul class="nav-links">
    <li><a href="../file-converter.html">← File Converter</a></li>
    <li><a href="../index.html">Home</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="../file-converter.html">File Converter</a><span>/</span><span>Excel to PDF</span></div>
  <h1 class="page-title">Excel to PDF</h1>
  <p class="page-desc">Convert Excel spreadsheets to PDF with perfect table formatting. All sheets included.</p>
</div>
<div class="tool-workspace">
  <div class="drop-zone" id="dz">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="drop-icon">📊</div>
    <div class="drop-title">Drop your Excel file here</div>
    <div class="drop-sub">or click to browse — .xlsx, .xls supported</div>
  </div>
  <div id="fileInfo" class="file-info" style="display:none">
    <div class="file-info-icon">📊</div>
    <div class="file-info-text">
      <div class="file-info-name" id="fname"></div>
      <div class="file-info-size" id="fsize"></div>
    </div>
    <button class="file-remove" onclick="resetFile()">✕</button>
  </div>
  <div class="progress-bar" id="prog"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="btn-row">
    <button class="btn-primary" id="convertBtn" onclick="convert()" disabled>📊 Convert to PDF</button>
  </div>
  <div class="status-msg" id="status"></div>
  <div class="result-box" id="result">
    <div class="result-label">Conversion complete</div>
    <div class="result-stat" id="resultName"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn-primary" id="dlBtn">⬇ Download PDF</button>
      <button class="btn-secondary" onclick="resetFile()">Convert another</button>
    </div>
  </div>
</div>
<footer><span class="footer-logo">Toolbox.</span><span class="footer-note">Free tools. Always.</span></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>
const { jsPDF } = window.jspdf;
let currentFile = null;

const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(f) {
  if (!f) return;
  if (!f.name.match(/\.(xlsx|xls)$/i)) { setStatus('Please upload an Excel file', 'error'); return; }
  currentFile = f;
  document.getElementById('fname').textContent = f.name;
  document.getElementById('fsize').textContent = formatSize(f.size);
  document.getElementById('fileInfo').style.display = 'flex';
  dz.style.display = 'none';
  document.getElementById('convertBtn').disabled = false;
  setStatus('');
}

function resetFile() {
  currentFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').style.display = 'none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('prog').classList.remove('active');
  dz.style.display = 'block';
  document.getElementById('convertBtn').disabled = true;
  setStatus('');
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status-msg' + (type ? ' ' + type : '');
}

async function convert() {
  if (!currentFile) return;
  const btn = document.getElementById('convertBtn');
  btn.disabled = true;
  setStatus('Reading Excel file...');
  const prog = document.getElementById('prog');
  const fill = document.getElementById('progFill');
  prog.classList.add('active');
  fill.style.width = '20%';

  try {
    const ab = await currentFile.arrayBuffer();
    fill.style.width = '40%';
    setStatus('Parsing spreadsheet...');

    // Read the Excel file
    const workbook = XLSX.read(ab, { type: 'array' });
    
    fill.style.width = '60%';
    setStatus('Building PDF...');

    // Create PDF
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });

    let isFirstSheet = true;

    // Process each sheet
    for (const sheetName of workbook.SheetNames) {
      const worksheet = workbook.Sheets[sheetName];
      
      // Convert sheet to JSON (array of arrays)
      const data = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
      
      // Skip empty sheets
      if (data.length === 0) continue;

      // Add new page for each sheet (except the first)
      if (!isFirstSheet) {
        pdf.addPage();
      }
      isFirstSheet = false;

      // Add sheet name as title
      pdf.setFontSize(14);
      pdf.setFont(undefined, 'bold');
      pdf.text(sheetName, 14, 15);

      // Prepare table data
      const headers = data[0].map(cell => String(cell || ''));
      const body = data.slice(1).map(row => 
        row.map(cell => String(cell !== undefined && cell !== null ? cell : ''))
      );

      // Create table
      pdf.autoTable({
        head: [headers],
        body: body,
        startY: 22,
        theme: 'grid',
        styles: {
          fontSize: 9,
          cellPadding: 2,
          overflow: 'linebreak',
          halign: 'left'
        },
        headStyles: {
          fillColor: [220, 220, 220],
          textColor: [0, 0, 0],
          fontStyle: 'bold'
        },
        alternateRowStyles: {
          fillColor: [245, 245, 245]
        },
        margin: { top: 22, left: 14, right: 14, bottom: 14 },
        tableWidth: 'auto',
        columnStyles: {},
        didParseCell: function(data) {
          // Auto-detect numeric cells and right-align them
          if (data.section === 'body' && data.cell.raw !== '') {
            const value = data.cell.raw;
            if (!isNaN(value) && value !== '') {
              data.cell.styles.halign = 'right';
            }
          }
        }
      });
    }

    fill.style.width = '90%';
    setStatus('Finalizing PDF...');

    // Save the PDF
    const pdfBlob = pdf.output('blob');
    const pdfName = currentFile.name.replace(/\.(xlsx|xls)$/i, '.pdf');

    fill.style.width = '100%';

    document.getElementById('resultName').textContent = pdfName;
    document.getElementById('resultSub').textContent = `PDF ready • ${formatSize(pdfBlob.size)} • ${workbook.SheetNames.length} sheet(s) • ${pdf.getNumberOfPages()} page(s)`;
    
    document.getElementById('dlBtn').onclick = () => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pdfBlob);
      a.download = pdfName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };

    document.getElementById('result').classList.add('show');
    setTimeout(() => prog.classList.remove('active'), 400);
    setStatus('Conversion complete!', 'success');

  } catch(e) {
    setStatus('Conversion failed: ' + e.message, 'error');
    prog.classList.remove('active');
    console.error(e);
  }
  btn.disabled = false;
}
</script>
</body></html>
