<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to PowerPoint — Toolbox</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Toolbox.</a>
  <ul class="nav-links">
    <li><a href="../file-converter.html">← File Converter</a></li>
    <li><a href="../index.html">Home</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="../file-converter.html">File Converter</a><span>/</span><span>PDF to PowerPoint</span></div>
  <h1 class="page-title">PDF to PowerPoint</h1>
  <p class="page-desc">Convert each PDF page into an image-based slide deck. Downloads as a .pptx file using PptxGenJS.</p>
</div>
<div class="tool-workspace">
  <div class="drop-zone" id="dz">
    <input type="file" id="fileInput" accept=".pdf">
    <div class="drop-icon">📊</div>
    <div class="drop-title">Drop your PDF here</div>
    <div class="drop-sub">Each page becomes a slide</div>
  </div>
  <div id="fileInfo" class="file-info" style="display:none">
    <div class="file-info-icon">📑</div>
    <div class="file-info-text"><div class="file-info-name" id="fname"></div><div class="file-info-size" id="fsize"></div></div>
    <button class="file-remove" onclick="resetFile()">✕</button>
  </div>
  <div class="progress-bar" id="prog"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="btn-row">
    <button class="btn-primary" id="convertBtn" onclick="convert()" disabled>Convert to PPTX</button>
  </div>
  <div class="status-msg" id="status"></div>
  <div class="result-box" id="result">
    <div class="result-label">Conversion complete</div>
    <div class="result-stat" id="resultStat"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn-primary" id="dlBtn">⬇ Download PPTX</button>
      <button class="btn-secondary" onclick="resetFile()">Convert another</button>
    </div>
  </div>
</div>
<footer><span class="footer-logo">Toolbox.</span><span class="footer-note">Free tools. Always.</span></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let currentFile=null;
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));

function handleFile(f){
  if(!f||!f.name.match(/\.pdf$/i)){setStatus('Please upload a PDF','error');return;}
  currentFile=f;
  document.getElementById('fname').textContent=f.name;
  document.getElementById('fsize').textContent=formatSize(f.size);
  document.getElementById('fileInfo').style.display='flex';
  dz.style.display='none';
  document.getElementById('convertBtn').disabled=false;
}

function resetFile(){
  currentFile=null;
  document.getElementById('fileInput').value='';
  document.getElementById('fileInfo').style.display='none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('prog').classList.remove('active');
  dz.style.display='block';
  document.getElementById('convertBtn').disabled=true;
  setStatus('');
}

function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function setStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status-msg'+(type?' '+type:'');}

async function convert(){
  if(!currentFile)return;
  document.getElementById('convertBtn').disabled=true;
  const prog=document.getElementById('prog');const fill=document.getElementById('progFill');
  prog.classList.add('active');fill.style.width='5%';
  try {
    const ab=await currentFile.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    const total=pdf.numPages;
    const pptx=new PptxGenJS();
    pptx.layout='LAYOUT_16x9';
    for(let i=1;i<=total;i++){
      fill.style.width=(5+(i/total)*85)+'%';
      setStatus(`Converting page ${i} of ${total}...`);
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:1.5});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      const dataUrl=canvas.toDataURL('image/jpeg',0.92);
      const slide=pptx.addSlide();
      slide.addImage({data:dataUrl,x:0,y:0,w:'100%',h:'100%'});
    }
    fill.style.width='100%';
    const name=currentFile.name.replace(/\.pdf$/i,'.pptx');
    document.getElementById('resultStat').textContent=name;
    document.getElementById('resultSub').textContent=`${total} slide${total>1?'s':''}`;
    document.getElementById('dlBtn').onclick=()=>pptx.writeFile({fileName:name});
    document.getElementById('result').classList.add('show');
    setTimeout(()=>prog.classList.remove('active'),400);
    setStatus('Done!','success');
  } catch(e){
    setStatus('Failed: '+e.message,'error');
    prog.classList.remove('active');
  }
  document.getElementById('convertBtn').disabled=false;
}
</script>
</body></html>
