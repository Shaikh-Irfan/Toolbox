<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word — Toolbox</title>
<link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Toolbox.</a>
  <ul class="nav-links">
    <li><a href="../file-converter.html">← File Converter</a></li>
    <li><a href="../index.html">Home</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="../file-converter.html">File Converter</a><span>/</span><span>PDF to Word</span></div>
  <h1 class="page-title">PDF to Word</h1>
  <p class="page-desc">Extract text from any PDF and download it as an editable .txt file. Works entirely in your browser.</p>
</div>
<div class="tool-workspace">
  <div class="drop-zone" id="dz">
    <input type="file" id="fileInput" accept=".pdf">
    <div class="drop-icon">📑</div>
    <div class="drop-title">Drop your PDF here</div>
    <div class="drop-sub">or click to browse — .pdf supported</div>
  </div>
  <div id="fileInfo" class="file-info" style="display:none">
    <div class="file-info-icon">📑</div>
    <div class="file-info-text">
      <div class="file-info-name" id="fname"></div>
      <div class="file-info-size" id="fsize"></div>
    </div>
    <button class="file-remove" onclick="resetFile()">✕</button>
  </div>
  <div class="progress-bar" id="prog"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="btn-row">
    <button class="btn-primary" id="convertBtn" onclick="convert()" disabled>Extract Text</button>
  </div>
  <div class="status-msg" id="status"></div>
  <div class="result-box" id="result">
    <div class="result-label">Extraction complete</div>
    <div class="result-stat" id="resultName"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn-primary" id="dlBtn">⬇ Download .docx</button>
      <button class="btn-secondary" onclick="resetFile()">Convert another</button>
    </div>
  </div>
</div>
<footer><span class="footer-logo">Toolbox.</span><span class="footer-note">Free tools. Always.</span></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let currentFile = null, extractedText = '';
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(f) {
  if (!f || !f.name.match(/\.pdf$/i)) { setStatus('Please upload a PDF file', 'error'); return; }
  currentFile = f;
  document.getElementById('fname').textContent = f.name;
  document.getElementById('fsize').textContent = formatSize(f.size);
  document.getElementById('fileInfo').style.display = 'flex';
  dz.style.display = 'none';
  document.getElementById('convertBtn').disabled = false;
}

function resetFile() {
  currentFile = null; extractedText = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').style.display = 'none';
  document.getElementById('result').classList.remove('show');
  document.getElementById('prog').classList.remove('active');
  dz.style.display = 'block';
  document.getElementById('convertBtn').disabled = true;
  setStatus('');
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status-msg' + (type ? ' ' + type : '');
}

async function convert() {
  if (!currentFile) return;
  document.getElementById('convertBtn').disabled = true;
  const prog = document.getElementById('prog');
  const fill = document.getElementById('progFill');
  prog.classList.add('active'); fill.style.width = '10%';
  setStatus('Reading PDF...');
  try {
    const ab = await currentFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const total = pdf.numPages;
    let text = '';
    for (let i = 1; i <= total; i++) {
      fill.style.width = (10 + (i/total)*80) + '%';
      setStatus(`Extracting page ${i} of ${total}...`);
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(s => s.str).join(' ') + '\n\n';
    }
    extractedText = text;
    fill.style.width = '100%';
    setTimeout(() => prog.classList.remove('active'), 500);
    const name = currentFile.name.replace(/\.pdf$/i, '.docx');
    document.getElementById('resultName').textContent = name.replace('.txt','.docx');
    document.getElementById('resultSub').textContent = `${total} page${total>1?'s':''} extracted · ${text.split(/\s+/).length.toLocaleString()} words`;
    document.getElementById('dlBtn').onclick = async () => {
      // Build a minimal .docx (OOXML) file in-browser without any library
      const paragraphs = text.split(/\n+/).filter(p=>p.trim());
      const bodyXml = paragraphs.map(p=>{
        const safe = p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<w:p><w:r><w:t xml:space="preserve">${safe}</w:t></w:r></w:p>`;
      }).join('');
      const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>${bodyXml}<w:sectPr/></w:body></w:document>`;
      const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
      const wordRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`;
      const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
      // Use JSZip to build the docx
      const JSZipScript = document.createElement('script');
      JSZipScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      document.head.appendChild(JSZipScript);
      await new Promise(r=>{ if(typeof JSZip!=='undefined'){r();}else{JSZipScript.onload=r;} });
      const zip = new JSZip();
      zip.file('[Content_Types].xml', contentTypesXml);
      zip.file('_rels/.rels', relsXml);
      zip.file('word/document.xml', docXml);
      zip.file('word/_rels/document.xml.rels', wordRelsXml);
      const blob = await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      const docxName = name.replace(/\.txt$/, '.docx');
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = docxName; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
    document.getElementById('result').classList.add('show');
    setStatus('Done!', 'success');
  } catch(e) {
    setStatus('Failed: ' + e.message, 'error');
    prog.classList.remove('active');
  }
  document.getElementById('convertBtn').disabled = false;
}
</script>
</body></html>
