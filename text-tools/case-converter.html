<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Toolbox</title>
<link rel="stylesheet" href="../shared.css">
<style>
.case-btns{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.25rem}
.case-btn{padding:0.5rem 1rem;background:var(--card-bg);border:0.5px solid var(--card-border);color:var(--muted);border-radius:3px;cursor:pointer;font-size:0.78rem;font-family:var(--sans);transition:all 0.2s}
.case-btn:hover,.case-btn.active{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);color:var(--text)}
.case-btns { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.25rem; }
.case-btn { padding:0.5rem 1rem; background:var(--card-bg); border:0.5px solid var(--card-border); color:var(--muted); border-radius:3px; cursor:pointer; font-size:0.78rem; font-family:var(--sans); transition:all 0.2s; }
.case-btn:hover, .case-btn.active { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.2); color:var(--text); }
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Toolbox.</a>
  <ul class="nav-links">
    <li><a href="../text-tools.html">← Text Tools</a></li>
    <li><a href="../index.html">Home</a></li>
  </ul>
</nav>
<div class="page-header">
  <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span><a href="../text-tools.html">Text Tools</a><span>/</span><span>Case Converter</span></div>
  <h1 class="page-title">Case Converter</h1>
  <p class="page-desc">Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, kebab-case and more.</p>
</div>
<div class="tool-workspace">
  <textarea class="textarea-tool" id="inputText" placeholder="Type or paste your text here..." style="min-height:160px" oninput="convert()"></textarea>
  <div class="case-btns" style="margin-top:1rem">
    <button class="case-btn active" onclick="setMode('upper',this)">UPPERCASE</button>
    <button class="case-btn" onclick="setMode('lower',this)">lowercase</button>
    <button class="case-btn" onclick="setMode('title',this)">Title Case</button>
    <button class="case-btn" onclick="setMode('sentence',this)">Sentence case</button>
    <button class="case-btn" onclick="setMode('camel',this)">camelCase</button>
    <button class="case-btn" onclick="setMode('pascal',this)">PascalCase</button>
    <button class="case-btn" onclick="setMode('snake',this)">snake_case</button>
    <button class="case-btn" onclick="setMode('kebab',this)">kebab-case</button>
    <button class="case-btn" onclick="setMode('constant',this)">CONSTANT_CASE</button>
    <button class="case-btn" onclick="setMode('alternate',this)">aLtErNaTe</button>
    <button class="case-btn" onclick="setMode('inverse',this)">iNVERSE</button>
  </div>
  <textarea class="textarea-tool" id="outputText" placeholder="Output will appear here..." style="min-height:160px" readonly></textarea>
  <div class="btn-row">
    <button class="btn-primary" onclick="copyOutput()">📋 Copy Output</button>
    <button class="btn-secondary" onclick="document.getElementById('inputText').value='';document.getElementById('outputText').value='';setStatus('')">Clear</button>
  </div>
  <div class="status-msg" id="status"></div>
  <div class="ad-strip" style="margin-top:2rem">Advertisement</div>
</div>
<footer><span class="footer-logo">Toolbox.</span><span class="footer-note">Free tools. Always.</span></footer>
<script>
let mode = 'upper';
function setMode(m, btn){
  mode = m;
  document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  convert();
}
function convert(){
  const text = document.getElementById('inputText').value;
  let out = '';
  switch(mode){
    case 'upper': out = text.toUpperCase(); break;
    case 'lower': out = text.toLowerCase(); break;
    case 'title': out = text.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()); break;
    case 'sentence': out = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); break;
    case 'camel':
      out = text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase());
      out = out.charAt(0).toLowerCase() + out.slice(1);
      break;
    case 'pascal':
      out = text.toLowerCase().replace(/(^\w|[^a-zA-Z0-9]+\w)/g, c => c.replace(/[^a-zA-Z0-9]/g,'').toUpperCase());
      break;
    case 'snake': out = text.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); break;
    case 'kebab': out = text.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); break;
    case 'constant': out = text.trim().toUpperCase().replace(/\s+/g,'_').replace(/[^A-Z0-9_]/g,''); break;
    case 'alternate': out = text.split('').map((c,i) => i%2===0?c.toLowerCase():c.toUpperCase()).join(''); break;
    case 'inverse': out = text.split('').map(c => c===c.toUpperCase()?c.toLowerCase():c.toUpperCase()).join(''); break;
  }
  document.getElementById('outputText').value = out;
}
async function copyOutput(){
  const out = document.getElementById('outputText').value;
  if(!out){ setStatus('Nothing to copy.'); return; }
  try {
    await navigator.clipboard.writeText(out);
    setStatus('Copied!', 'success');
  } catch(e){ setStatus('Copy failed — select and copy manually.','error'); }
  setTimeout(() => setStatus(''), 2000);
}
function setStatus(msg, type=''){
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status-msg' + (type?' '+type:'');
}
</script>
</body></html>
